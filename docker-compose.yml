version: '3'

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - blockchain
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    networks:
      - app-network

  blockchain:
    build: ./blockchain
    container_name: blockchain
    ports:
      - "8545:8545"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge