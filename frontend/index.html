<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Legend ✨</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #000428, #004e92);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
      position: relative;
    }

    #particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 0.2; }
      100% { transform: translateY(-120vh); opacity: 0; }
    }

    .container {
      position: relative;
      background: rgba(255,255,255,0.1);
      padding: 50px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(255,255,255,0.2);
      text-align: center;
      z-index: 1;
      width: 350px;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(90deg,#00c6ff,#0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .typing {
      border-right: 2px solid white;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 4s steps(40,end) infinite;
    }

    @keyframes typing {
      0%,100% { width: 0; }
      50% { width: 100%; }
    }

    select, button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
    }

    select {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    button {
      background: linear-gradient(90deg,#ff512f,#dd2476);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<div id="particles"></div>

<div class="container">
  <h1>🚀 DevOps + Blockchain</h1>
  <p class="typing">Docker | CI/CD | Monitoring | Web3</p>

  <!-- 🔥 NEW PAYMENT UI -->
  <select id="payment">
    <option value="">Select Payment Method</option>
    <option value="UPI">UPI</option>
    <option value="Card">Card</option>
    <option value="Crypto">Crypto (Blockchain)</option>
  </select>

  <button onclick="processPayment()">Pay Now</button>

  <div id="result"></div>
</div>

<script>
  // particles
  const particlesContainer = document.getElementById('particles');
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'vw';
    let size=Math.random()*6+2;
    p.style.width=p.style.height=size+'px';
    p.style.animationDuration=(Math.random()*8+5)+'s';
    particlesContainer.appendChild(p);
  }

  // payment logic
  async function processPayment(){
    const method=document.getElementById("payment").value;

    if(!method){
      alert("Select payment method");
      return;
    }

    let resultText="";

    if(method==="Crypto"){
      try{
        const res=await fetch("http://localhost:5000/blockchain");
        const data=await res.json();
        resultText="✅ Blockchain Connected | Transaction counter: "+data.block_number;
      }catch(err){
        resultText="❌ Blockchain not reachable";
      }
    } else {
      resultText="✅ "+method+" Payment Successful";
    }

    document.getElementById("result").innerText=resultText;
  }
</script>

</body>
</html>
